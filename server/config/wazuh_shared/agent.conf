<!--
  GuiZang 集中下发的 Agent 配置（default 组）。Manager 会把本文件推送给所有 Agent。

  覆盖：
   1) 高危测试目录（演示用，保持原有功能不变）
   2) 木马/流氓软件常见落地点的实时文件监控（Temp/下载/AppData/启动项 + 注册表 Run 键）
   3) 进程/行为日志源（Sysmon + PowerShell + Windows Defender 事件通道）
  说明：事件通道与 Windows 路径仅对 Windows 终端有效；非 Windows 节点会自动忽略。
  不需要时删除本文件并重启 manager 即可还原。
-->
<agent_config>
  <syscheck>
    <disabled>no</disabled>
    <!-- 允许对「新增文件」告警，否则默认不报 554 -->
    <alert_new_files>yes</alert_new_files>

    <!-- (1) 高危测试目录（演示触发器，保持不变） -->
    <directories realtime="yes" check_all="yes" report_changes="yes">C:\GuiZang-Sentinel-Test</directories>

    <!-- (2) 木马/流氓软件常见落地点（实时监控） -->
    <directories realtime="yes" check_all="yes">C:\Windows\Temp</directories>
    <directories realtime="yes" check_all="yes">C:\Users\*\AppData\Local\Temp</directories>
    <directories realtime="yes" check_all="yes">C:\Users\*\AppData\Roaming</directories>
    <directories realtime="yes" check_all="yes">C:\Users\*\Downloads</directories>
    <directories realtime="yes" check_all="yes">C:\Users\*\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>
    <directories realtime="yes" check_all="yes">C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp</directories>

    <!-- 降噪：忽略明显高频且无安全意义的缓存/日志 -->
    <ignore type="sregex">\\Cache\\|\\Code Cache\\|\\GPUCache\\</ignore>
    <ignore type="sregex">\.log$|\.tmp$|\.etl$</ignore>

    <!-- 持久化常用注册表 Run 键（实时） -->
    <windows_registry arch="both" realtime="yes">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both" realtime="yes">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
  </syscheck>

  <!-- (3) 进程/行为日志源：事件通道采集 -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
</agent_config>
