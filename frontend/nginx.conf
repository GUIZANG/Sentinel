server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Agent 安装包下载页：/download/ 渲染 index.html（落地页含一键命令）
    location /download/ {
        autoindex on;
    }

    # 脚本文件强制以附件下载，避免浏览器把 .ps1/.command 当文本直接显示
    location ~* ^/download/.+\.(ps1|command|sh)$ {
        add_header Content-Disposition "attachment";
        default_type application/octet-stream;
    }

    # 单页应用：所有前端路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 BFF（compose 服务名 bff:8000）
    location /api/ {
        proxy_pass http://bff:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    location /health {
        proxy_pass http://bff:8000/health;
    }
}
